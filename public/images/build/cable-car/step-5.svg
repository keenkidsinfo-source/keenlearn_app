<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Before: regular paperclip -->
  <text x="90" y="60" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#6b7280">Before</text>
  <path d="M65 80 Q65 70 75 70 L105 70 Q115 70 115 80 L115 130 Q115 140 105 140 L85 140 Q75 140 75 130 L75 95 Q75 90 80 90 L105 90" fill="none" stroke="#6b7280" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrow -->
  <text x="200" y="130" text-anchor="middle" font-family="Arial" font-size="40" fill="#f97316">→</text>
  <!-- After: S-hook -->
  <text x="300" y="60" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#f97316">S-Hook!</text>
  <path d="M300 80 Q300 70 310 70 Q320 70 320 80 Q320 90 310 95 Q300 100 300 110 Q300 120 310 120 Q320 120 320 110" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
  <!-- Bend arrows on the paperclip -->
  <path d="M125 90 Q150 80 175 90" stroke="#f97316" stroke-width="2" fill="none" stroke-dasharray="4 2" marker-end="url(#arr3)"/>
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <!-- String connection show -->
  <line x1="285" y1="70" x2="260" y2="50" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="240" y="46" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">clip to string</text>
  <!-- Instructions -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Bend a paperclip into an S-shape 🪝</text>
  <rect x="40" y="205" width="320" height="60" rx="12" fill="#fef3c7" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="224" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">1. Hold one end of the paperclip</text>
  <text x="200" y="241" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">2. Bend the outer loop outward</text>
  <text x="200" y="258" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">3. You now have a hook shape!</text>
</svg>
