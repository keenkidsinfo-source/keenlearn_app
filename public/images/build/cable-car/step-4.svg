<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Cup -->
  <path d="M130 50 L110 210 Q110 220 150 220 L250 220 Q290 220 290 210 L270 50 Z" fill="white" stroke="#d1d5db" stroke-width="2"/>
  <rect x="128" y="48" width="144" height="16" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <!-- Holes -->
  <circle cx="140" cy="76" r="6" fill="#374151"/>
  <circle cx="260" cy="76" r="6" fill="#374151"/>
  <!-- String -->
  <line x1="50" y1="76" x2="350" y2="76" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <!-- Tape patches over holes -->
  <rect x="122" y="62" width="36" height="28" rx="3" fill="#d4d4d4" opacity="0.85" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="130" y1="62" x2="130" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <line x1="138" y1="62" x2="138" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <line x1="146" y1="62" x2="146" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <rect x="242" y="62" width="36" height="28" rx="3" fill="#d4d4d4" opacity="0.85" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="250" y1="62" x2="250" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <line x1="258" y1="62" x2="258" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <line x1="266" y1="62" x2="266" y2="90" stroke="#a3a3a3" stroke-width="0.5"/>
  <!-- Tape roll -->
  <circle cx="340" cy="180" r="35" fill="#d4d4d4" stroke="#9ca3af" stroke-width="3"/>
  <circle cx="340" cy="180" r="15" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <!-- Arrow from tape roll to cup -->
  <path d="M305 165 Q270 140 270 90" stroke="#9ca3af" stroke-width="2.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <text x="200" y="260" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Tape patches over both holes 🩹</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">This stops the string from tearing through!</text>
</svg>
