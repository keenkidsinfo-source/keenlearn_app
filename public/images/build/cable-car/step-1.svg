<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Chair left (elevated) -->
  <rect x="30" y="90" width="70" height="12" rx="3" fill="#92400e"/>
  <rect x="30" y="60" width="12" height="42" rx="3" fill="#92400e"/>
  <rect x="34" y="102" width="8" height="50" rx="3" fill="#92400e"/>
  <rect x="80" y="102" width="8" height="50" rx="3" fill="#92400e"/>
  <rect x="30" y="86" width="70" height="6" rx="3" fill="#b45309"/>
  <!-- Chair right (lower) -->
  <rect x="300" y="150" width="70" height="12" rx="3" fill="#92400e"/>
  <rect x="358" y="120" width="12" height="42" rx="3" fill="#92400e"/>
  <rect x="304" y="162" width="8" height="50" rx="3" fill="#92400e"/>
  <rect x="354" y="162" width="8" height="50" rx="3" fill="#92400e"/>
  <rect x="300" y="146" width="70" height="6" rx="3" fill="#b45309"/>
  <!-- Zip line -->
  <line x1="65" y1="84" x2="335" y2="144" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <!-- Straw on line -->
  <rect x="172" y="104" width="56" height="14" rx="7" fill="#f97316" transform="rotate(-9,200,111)"/>
  <!-- Cup hanging from straw -->
  <path d="M190 118 L182 150 Q182 155 195 155 L215 155 Q228 155 228 150 L220 118 Z" fill="white" stroke="#f97316" stroke-width="2"/>
  <line x1="195" y1="118" x2="225" y2="118" stroke="#f97316" stroke-width="2"/>
  <!-- String from straw to cup -->
  <line x1="200" y1="118" x2="205" y2="118" stroke="#374151" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="65" y="175" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#92400e">Higher end</text>
  <text x="335" y="210" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#92400e">Lower end</text>
  <text x="200" y="285" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="15" fill="#ea580c" font-weight="bold">The Zip Line is Ready! 🎉</text>
</svg>
