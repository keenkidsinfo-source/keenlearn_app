<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Zip line -->
  <line x1="20" y1="60" x2="380" y2="120" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <!-- Straw -->
  <rect x="168" y="72" width="64" height="14" rx="7" fill="#f97316" transform="rotate(-8.5,200,79)"/>
  <!-- Cup hanging -->
  <line x1="200" y1="82" x2="200" y2="105" stroke="#374151" stroke-width="2.5"/>
  <path d="M178 105 L170 175 Q170 183 195 183 L215 183 Q240 183 240 175 L232 105 Z" fill="white" stroke="#f97316" stroke-width="2.5"/>
  <rect x="176" y="102" width="58" height="8" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Motion lines -->
  <line x1="130" y1="75" x2="105" y2="73" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="128" y1="88" x2="100" y2="90" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="132" y1="100" x2="108" y2="104" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Gravity arrow -->
  <line x1="200" y1="185" x2="200" y2="215" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#garr)"/>
  <defs>
    <marker id="garr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="230" y="205" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#3b82f6">Gravity!</text>
  <!-- Checkpoints -->
  <rect x="300" y="185" width="90" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="345" y="202" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#15803d">Does it reach</text>
  <text x="345" y="218" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#15803d">the end? ✓</text>
  <text x="345" y="234" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#15803d">No stopping? ✓</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Let it go — does it GLIDE? 🚡</text>
</svg>
