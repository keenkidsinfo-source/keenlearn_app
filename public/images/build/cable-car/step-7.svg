<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Zip line -->
  <line x1="20" y1="60" x2="380" y2="120" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
  <!-- Straw -->
  <rect x="168" y="72" width="64" height="14" rx="7" fill="#f97316" transform="rotate(-8.5,200,79)"/>
  <!-- String -->
  <line x1="200" y1="82" x2="200" y2="108" stroke="#374151" stroke-width="2.5"/>
  <!-- Cup with paperclips inside -->
  <path d="M172 108 L162 185 Q162 195 195 195 L215 195 Q248 195 248 185 L238 108 Z" fill="white" stroke="#f97316" stroke-width="2.5"/>
  <rect x="170" y="104" width="70" height="8" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Paperclips in cup -->
  <path d="M183 135 Q183 127 190 127 L200 127 Q207 127 207 135 L207 155 Q207 162 200 162 L195 162 Q188 162 188 155 L188 140" fill="none" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M198 145 Q198 137 205 137 L213 137 Q220 137 220 145 L220 160 Q220 167 213 167 L210 167 Q203 167 203 160 L203 150" fill="none" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M210 130 Q210 122 217 122 L225 122 Q232 122 232 130 L232 148 Q232 155 225 155 L222 155 Q215 155 215 148 L215 138" fill="none" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Count badge -->
  <circle cx="310" cy="150" r="45" fill="#fef3c7" stroke="#f97316" stroke-width="3"/>
  <text x="310" y="140" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="28" fill="#ea580c" font-weight="bold">3</text>
  <text x="310" y="162" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">paperclips</text>
  <text x="310" y="177" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">so far!</text>
  <!-- Plus arrow -->
  <text x="268" y="155" font-family="Arial" font-size="28" fill="#f97316">+</text>
  <text x="200" y="240" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Add paperclips ONE at a time 📎</text>
  <text x="200" y="258" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">How many can your cable car carry?</text>
  <text x="200" y="276" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Write your number on the class chart!</text>
</svg>
