<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Cup -->
  <path d="M130 50 L110 210 Q110 220 150 220 L250 220 Q290 220 290 210 L270 50 Z" fill="white" stroke="#d1d5db" stroke-width="2"/>
  <rect x="128" y="48" width="144" height="16" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <!-- Holes -->
  <circle cx="140" cy="76" r="6" fill="#374151"/>
  <circle cx="260" cy="76" r="6" fill="#374151"/>
  <!-- String going through -->
  <line x1="50" y1="76" x2="140" y2="76" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="76" x2="260" y2="76" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 4"/>
  <line x1="260" y1="76" x2="350" y2="76" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <!-- Knots -->
  <circle cx="60" cy="76" r="10" fill="#ea580c" stroke="white" stroke-width="2"/>
  <text x="60" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">K</text>
  <circle cx="340" cy="76" r="10" fill="#ea580c" stroke="white" stroke-width="2"/>
  <text x="340" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">K</text>
  <!-- Cup hanging level indicator -->
  <line x1="200" y1="76" x2="200" y2="100" stroke="#9ca3af" stroke-width="2" stroke-dasharray="3 2"/>
  <!-- Labels -->
  <text x="60" y="105" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#92400e">Knot!</text>
  <text x="340" y="105" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#92400e">Knot!</text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#92400e">String goes through BOTH holes 🪢</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Knot outside so it can't pull through!</text>
  <!-- Cup level arrow -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#16a34a">Cup should hang level ✓</text>
</svg>
