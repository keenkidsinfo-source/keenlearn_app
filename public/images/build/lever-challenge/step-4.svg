<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f0fdf4" rx="20"/>
  <text x="200" y="28" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#0891b2">Build Class 3: Speed Lever 🥢</text>
  <!-- Popsicle stick lever -->
  <rect x="60" y="135" width="280" height="14" rx="5" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <!-- Fulcrum at LEFT end -->
  <rect x="63" y="149" width="14" height="32" rx="3" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
  <rect x="55" y="181" width="30" height="7" rx="3" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="70" y="202" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="8" fill="#dc2626">fulcrum</text>
  <!-- Effort in MIDDLE (finger pushing down) -->
  <line x1="195" y1="118" x2="195" y2="135" stroke="#3b82f6" stroke-width="3" marker-end="url(#blarr4)" stroke-linecap="round"/>
  <defs>
    <marker id="blarr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="195" y="112" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#3b82f6">effort</text>
  <!-- Load at RIGHT end (cotton ball / feather lifted) -->
  <circle cx="325" cy="122" r="12" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
  <text x="325" y="127" text-anchor="middle" font-family="Arial" font-size="14">🪶</text>
  <line x1="325" y1="135" x2="325" y2="135" stroke="#0891b2" stroke-width="2"/>
  <text x="325" y="155" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#0891b2">load</text>
  <!-- Speed arrows -->
  <path d="M300 108 Q325 90 350 108" stroke="#0891b2" stroke-width="2.5" fill="none" stroke-dasharray="5 2" marker-end="url(#cynarr)"/>
  <defs>
    <marker id="cynarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891b2"/>
    </marker>
  </defs>
  <text x="360" y="95" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#0891b2">FAST!</text>
  <!-- E-F-L label -->
  <text x="70" y="218" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#f97316">F</text>
  <text x="195" y="218" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#3b82f6">E</text>
  <text x="325" y="218" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#ef4444">L</text>
  <line x1="85" y1="213" x2="180" y2="213" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="210" y1="213" x2="310" y2="213" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 2"/>
  <rect x="30" y="232" width="340" height="45" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="200" y="250" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#0891b2">Class 3 order: F — E — L</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#374151">Effort in MIDDLE. Less force advantage but moves FAST!</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#374151">Think: tweezers, fishing rod, your forearm!</text>
</svg>
