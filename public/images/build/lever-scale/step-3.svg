<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Pencil eraser (fulcrum) -->
  <rect x="185" y="168" width="30" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="185" y="168" width="30" height="12" rx="3" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="188" y="185" width="24" height="4" rx="2" fill="#c4b5fd"/>
  <text x="200" y="232" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#92400e">pencil</text>
  <!-- Ruler balanced on eraser -->
  <rect x="55" y="150" width="290" height="18" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <line x1="200" y1="150" x2="200" y2="160" stroke="#92400e" stroke-width="2.5"/>
  <text x="200" y="147" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#92400e">notch here</text>
  <!-- Left cup -->
  <line x1="72" y1="168" x2="72" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M50 192 L46 228 Q46 236 62 236 L82 236 Q98 236 98 228 L94 192 Z" fill="white" stroke="#f97316" stroke-width="2"/>
  <rect x="48" y="188" width="48" height="7" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Right cup -->
  <line x1="328" y1="168" x2="328" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M306 192 L302 228 Q302 236 318 236 L338 236 Q354 236 354 228 L350 192 Z" fill="white" stroke="#f97316" stroke-width="2"/>
  <rect x="304" y="188" width="48" height="7" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Level indicator -->
  <line x1="50" y1="145" x2="350" y2="145" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="200" y="142" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#16a34a">roughly level ✓</text>
  <!-- Nudge arrow -->
  <path d="M215 218 Q230 205 245 218" stroke="#7c3aed" stroke-width="2" fill="none" stroke-dasharray="4 2" marker-end="url(#nudarr)"/>
  <defs>
    <marker id="nudarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="245" y="238" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#7c3aed">nudge if needed</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Balance ruler on pencil eraser ✏️</text>
  <text x="200" y="289" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Place at the centre notch — should sit level!</text>
</svg>
