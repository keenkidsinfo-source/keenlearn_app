<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Prediction chart -->
  <rect x="30" y="20" width="340" height="210" rx="14" fill="white" stroke="#f97316" stroke-width="2.5"/>
  <rect x="30" y="20" width="340" height="36" rx="14" fill="#f97316"/>
  <rect x="30" y="42" width="340" height="14" rx="0" fill="#f97316"/>
  <text x="200" y="44" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="white">My Prediction Chart 🔮</text>
  <!-- Table header -->
  <line x1="30" y1="70" x2="370" y2="70" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="90" y="64" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#6b7280">Object A</text>
  <text x="200" y="64" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#6b7280">Object B</text>
  <text x="310" y="64" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#6b7280">My Guess</text>
  <line x1="150" y1="56" x2="150" y2="230" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="255" y1="56" x2="255" y2="230" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Row 1 -->
  <line x1="30" y1="100" x2="370" y2="100" stroke="#f3f4f6" stroke-width="1"/>
  <text x="90" y="90" text-anchor="middle" font-family="Arial" font-size="18">✏️</text>
  <text x="200" y="90" text-anchor="middle" font-family="Arial" font-size="18">🖍️</text>
  <text x="310" y="93" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#f97316">_____</text>
  <!-- Row 2 -->
  <line x1="30" y1="130" x2="370" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <text x="90" y="120" text-anchor="middle" font-family="Arial" font-size="18">🪙</text>
  <text x="200" y="120" text-anchor="middle" font-family="Arial" font-size="18">📎</text>
  <text x="310" y="123" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#f97316">_____</text>
  <!-- Row 3 -->
  <line x1="30" y1="160" x2="370" y2="160" stroke="#f3f4f6" stroke-width="1"/>
  <text x="90" y="150" text-anchor="middle" font-family="Arial" font-size="18">🪨</text>
  <text x="200" y="150" text-anchor="middle" font-family="Arial" font-size="18">🧸</text>
  <text x="310" y="153" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#f97316">_____</text>
  <!-- Row 4 -->
  <text x="90" y="180" text-anchor="middle" font-family="Arial" font-size="18">🔘</text>
  <text x="200" y="180" text-anchor="middle" font-family="Arial" font-size="18">🖊️</text>
  <text x="310" y="183" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#f97316">_____</text>
  <!-- Important note -->
  <rect x="30" y="210" width="340" height="26" rx="0" fill="#fef3c7"/>
  <rect x="30" y="222" width="340" height="14" rx="14" fill="#fef3c7"/>
  <text x="200" y="228" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#92400e">⚠️ Write your guess BEFORE you test!</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Fill in your prediction chart first! 🔮</text>
</svg>
