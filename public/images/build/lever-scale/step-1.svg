<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Ruler -->
  <rect x="60" y="130" width="280" height="18" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <!-- Ruler markings -->
  <line x1="100" y1="130" x2="100" y2="138" stroke="#92400e" stroke-width="1.5"/>
  <line x1="140" y1="130" x2="140" y2="140" stroke="#92400e" stroke-width="2"/>
  <line x1="180" y1="130" x2="180" y2="143" stroke="#92400e" stroke-width="2.5"/>
  <line x1="220" y1="130" x2="220" y2="140" stroke="#92400e" stroke-width="2"/>
  <line x1="260" y1="130" x2="260" y2="138" stroke="#92400e" stroke-width="1.5"/>
  <text x="180" y="125" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#92400e">15cm centre</text>
  <!-- Left cup string -->
  <line x1="75" y1="148" x2="75" y2="175" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left cup -->
  <path d="M52 175 L48 220 Q48 228 65 228 L85 228 Q102 228 102 220 L98 175 Z" fill="white" stroke="#f97316" stroke-width="2.5"/>
  <rect x="50" y="171" width="50" height="8" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Arrow pointing to left -->
  <path d="M45 190 Q28 190 28 175 Q28 155 55 148" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="5 3" marker-end="url(#orangearr)"/>
  <defs>
    <marker id="orangearr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <text x="22" y="210" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#f97316">Tape</text>
  <text x="22" y="222" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#f97316">here!</text>
  <!-- Right side faded/todo -->
  <line x1="325" y1="148" x2="325" y2="175" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 3"/>
  <path d="M302 175 L298 220 Q298 228 315 228 L335 228 Q352 228 352 220 L348 175 Z" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="325" y="250" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#9ca3af">next step →</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Tape LEFT cup string to ruler end ⚖️</text>
  <text x="200" y="287" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Cup must hang below the ruler edge!</text>
</svg>
