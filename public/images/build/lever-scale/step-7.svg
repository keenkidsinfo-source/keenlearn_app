<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Scale with fulcrum moved toward heavy side - balancing unequal objects -->
  <!-- Fulcrum moved left of centre -->
  <rect x="138" y="168" width="28" height="42" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="138" y="168" width="28" height="10" rx="3" fill="#fca5a5"/>
  <!-- Ruler now level despite unequal objects -->
  <rect x="55" y="150" width="290" height="17" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <!-- Left cup (heavy - eraser) - close to fulcrum -->
  <line x1="88" y1="167" x2="88" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M66 192 L62 226 Q62 234 78 234 L98 234 Q114 234 114 226 L110 192 Z" fill="white" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="64" y="188" width="48" height="7" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="88" y="218" text-anchor="middle" font-family="Arial" font-size="18">✏️</text>
  <!-- Right cup (light - cotton) - far from fulcrum -->
  <line x1="328" y1="167" x2="328" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M306 192 L302 226 Q302 234 318 234 L338 234 Q354 234 354 226 L350 192 Z" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="304" y="188" width="48" height="7" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="328" y="218" text-anchor="middle" font-family="Arial" font-size="18">🧸</text>
  <!-- Level indicator -->
  <line x1="55" y1="142" x2="345" y2="142" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="200" y="140" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#16a34a">balanced! ✓</text>
  <!-- Fulcrum move arrow -->
  <path d="M200 195 Q175 210 154 195" stroke="#7c3aed" stroke-width="2.5" fill="none" marker-end="url(#purparr)"/>
  <defs>
    <marker id="purparr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="200" y="215" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#7c3aed">slide fulcrum toward heavy side</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#92400e">Move the fulcrum — can you balance them? 🧩</text>
  <text x="200" y="282" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Discover the rule: closer to heavy = balanced!</text>
</svg>
