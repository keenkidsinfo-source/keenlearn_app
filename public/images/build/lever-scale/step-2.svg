<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Ruler -->
  <rect x="60" y="130" width="280" height="18" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <line x1="200" y1="130" x2="200" y2="145" stroke="#92400e" stroke-width="2.5"/>
  <text x="200" y="125" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#92400e">centre</text>
  <!-- Left cup (done - green check) -->
  <line x1="75" y1="148" x2="75" y2="175" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M52 175 L48 220 Q48 228 65 228 L85 228 Q102 228 102 220 L98 175 Z" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="50" y="171" width="50" height="8" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="75" y="208" text-anchor="middle" font-family="Arial" font-size="20">✅</text>
  <!-- Right cup being added -->
  <line x1="325" y1="148" x2="325" y2="175" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M302 175 L298 220 Q298 228 315 228 L335 228 Q352 228 352 220 L348 175 Z" fill="white" stroke="#f97316" stroke-width="2.5"/>
  <rect x="300" y="171" width="50" height="8" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <!-- Arrow pointing to right -->
  <path d="M365 190 Q382 190 382 175 Q382 155 352 148" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="5 3" marker-end="url(#orangearr2)"/>
  <defs>
    <marker id="orangearr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <text x="372" y="210" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#f97316">Tape</text>
  <text x="372" y="222" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#f97316">here!</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Now tape the RIGHT cup to the other end ⚖️</text>
  <text x="200" y="287" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#b45309">Both cups should hang at the same height!</text>
</svg>
