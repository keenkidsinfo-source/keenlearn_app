<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fff7ed" rx="20"/>
  <!-- Balanced scale with same object in both cups -->
  <rect x="185" y="168" width="30" height="45" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="185" y="168" width="30" height="10" rx="3" fill="#fca5a5"/>
  <!-- Ruler level -->
  <rect x="55" y="150" width="290" height="18" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <!-- Left cup with eraser -->
  <line x1="72" y1="168" x2="72" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M50 192 L46 228 Q46 236 62 236 L82 236 Q98 236 98 228 L94 192 Z" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="48" y="188" width="48" height="7" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="72" y="220" text-anchor="middle" font-family="Arial" font-size="22">✏️</text>
  <!-- Right cup with same eraser -->
  <line x1="328" y1="168" x2="328" y2="192" stroke="#374151" stroke-width="2.5"/>
  <path d="M306 192 L302 228 Q302 236 318 236 L338 236 Q354 236 354 228 L350 192 Z" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="304" y="188" width="48" height="7" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="328" y="220" text-anchor="middle" font-family="Arial" font-size="22">✏️</text>
  <!-- Level line -->
  <line x1="50" y1="145" x2="350" y2="145" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Big check -->
  <circle cx="200" cy="100" r="32" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="200" y="112" text-anchor="middle" font-family="Arial" font-size="36">✓</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#92400e">Same object in both cups — stays flat? ✓</text>
  <text x="200" y="289" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#16a34a">Your scale is working! Now you're ready to weigh!</text>
</svg>
