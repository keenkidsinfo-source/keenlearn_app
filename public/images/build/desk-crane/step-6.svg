<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- 3 columns for 3 methods -->
  <!-- Method 1: Bare hand -->
  <rect x="15" y="25" width="110" height="220" rx="12" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="70" y="46" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#ef4444">Bare Hand</text>
  <!-- Hand + cup -->
  <text x="70" y="100" text-anchor="middle" font-family="Arial" font-size="36">✋</text>
  <line x1="70" y1="115" x2="70" y2="140" stroke="#374151" stroke-width="2.5"/>
  <path d="M55 140 L52 165 Q52 172 63 172 L77 172 Q88 172 88 165 L85 140 Z" fill="white" stroke="#6b7280" stroke-width="2"/>
  <!-- Effort label -->
  <rect x="22" y="185" width="96" height="28" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="70" y="200" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#ef4444">HARD 💪</text>
  <text x="70" y="213" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#ef4444">all your effort</text>

  <!-- Method 2: Fixed pulley -->
  <rect x="145" y="25" width="110" height="220" rx="12" fill="white" stroke="#f97316" stroke-width="2"/>
  <text x="200" y="42" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#f97316">Fixed Pulley</text>
  <!-- Spool + string direction change -->
  <circle cx="200" cy="80" r="18" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <circle cx="200" cy="80" r="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="200" y1="62" x2="200" y2="40" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="98" x2="200" y2="130" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M155 140 L152 165 Q152 172 163 172 L177 172 Q188 172 188 165 L185 140 Z" fill="white" stroke="#6b7280" stroke-width="2"/>
  <rect x="152" y="172" width="42" height="10" rx="3" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
  <rect x="185" y="185" width="96" height="28" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="200" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#f97316">MEDIUM</text>
  <text x="200" y="213" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#f97316">direction changes</text>

  <!-- Method 3: Compound -->
  <rect x="275" y="25" width="110" height="220" rx="12" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <text x="330" y="42" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#16a34a">Compound!</text>
  <!-- Two spools -->
  <circle cx="330" cy="68" r="14" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <circle cx="330" cy="68" r="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="318" cy="115" r="14" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="318" cy="115" r="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="318" y1="129" x2="318" y2="150" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <path d="M304 150 L300 172 Q300 179 312 179 L328 179 Q340 179 340 172 L336 150 Z" fill="white" stroke="#16a34a" stroke-width="2"/>
  <rect x="282" y="185" width="96" height="28" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="200" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#16a34a">EASY! 🎉</text>
  <text x="330" y="213" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="9" fill="#16a34a">least effort!</text>

  <text x="200" y="260" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#7e22ce">Test all 3 ways — which feels easiest? 💪</text>
</svg>
