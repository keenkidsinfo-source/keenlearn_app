<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- Mast -->
  <rect x="60" y="60" width="24" height="170" rx="5" fill="#d97706"/>
  <!-- Boom -->
  <rect x="80" y="62" width="160" height="14" rx="5" fill="#92400e"/>
  <!-- Fixed spool at boom end -->
  <circle cx="240" cy="69" r="18" fill="#e5e7eb" stroke="#6b7280" stroke-width="2.5"/>
  <circle cx="240" cy="69" r="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- String path: over fixed spool, down, under movable spool, back up to boom -->
  <path d="M75 62 Q72 62 72 75 L72 175 Q72 182 80 185" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Over fixed spool -->
  <path d="M220 55 Q240 42 258 55" stroke="#f97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Down from fixed spool to movable spool -->
  <line x1="258" y1="55" x2="258" y2="130" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <!-- Movable spool -->
  <circle cx="232" cy="148" r="20" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="232" cy="148" r="9" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Under movable spool -->
  <path d="M258 130 Q258 168 232 168" stroke="#f97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Back up to boom -->
  <line x1="212" y1="148" x2="212" y2="62" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 3"/>
  <!-- Tie point on boom -->
  <circle cx="212" cy="62" r="5" fill="#ea580c"/>
  <!-- Labels -->
  <text x="270" y="148" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#7c3aed">Movable</text>
  <text x="270" y="160" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#7c3aed">pulley</text>
  <text x="270" y="172" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#7c3aed">(hangs free)</text>
  <!-- Effort string -->
  <line x1="72" y1="175" x2="50" y2="220" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <text x="38" y="235" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#374151">Pull here</text>
  <text x="200" y="258" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#7e22ce">Thread string: over → under → back up 🔄</text>
  <text x="200" y="276" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Movable spool must hang freely below boom!</text>
</svg>
