<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- Crane outline -->
  <rect x="60" y="50" width="24" height="170" rx="5" fill="#d97706"/>
  <rect x="80" y="52" width="140" height="13" rx="5" fill="#92400e"/>
  <circle cx="220" cy="58" r="16" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <circle cx="208" cy="120" r="16" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
  <line x1="208" y1="136" x2="208" y2="158" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Load cup -->
  <path d="M190 158 L186 195 Q186 202 198 202 L218 202 Q230 202 230 195 L226 158 Z" fill="white" stroke="#7c3aed" stroke-width="2.5"/>
  <rect x="188" y="155" width="40" height="7" rx="3" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Original 10 pennies -->
  <text x="208" y="188" text-anchor="middle" font-family="Arial" font-size="20">🪙</text>
  <!-- Plus 10 more pennies badge -->
  <circle cx="310" cy="130" r="50" fill="#fef3c7" stroke="#f97316" stroke-width="3"/>
  <text x="310" y="118" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#92400e">+10 more</text>
  <text x="310" y="135" text-anchor="middle" font-family="Arial" font-size="22">🪙🪙</text>
  <text x="310" y="155" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#92400e">DOUBLE!</text>
  <!-- Arrow from badge to cup -->
  <path d="M262 140 Q245 158 232 178" stroke="#f97316" stroke-width="2.5" fill="none" stroke-dasharray="5 3" marker-end="url(#yarr)"/>
  <defs>
    <marker id="yarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>
  <text x="200" y="248" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="13" fill="#7e22ce">Add 10 more pennies — double the load! 🪙</text>
  <text x="200" y="266" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Does compound still feel easier than bare hand?</text>
  <text x="200" y="283" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Record on the class chart!</text>
</svg>
