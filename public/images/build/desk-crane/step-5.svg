<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- Mast -->
  <rect x="80" y="50" width="24" height="180" rx="5" fill="#d97706"/>
  <!-- Boom -->
  <rect x="100" y="52" width="150" height="13" rx="5" fill="#92400e"/>
  <!-- Fixed spool -->
  <circle cx="250" cy="58" r="16" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <circle cx="250" cy="58" r="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Movable spool -->
  <circle cx="230" cy="135" r="18" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="230" cy="135" r="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- String simplified -->
  <line x1="248" y1="42" x2="248" y2="117" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="212" y1="135" x2="212" y2="52" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 2"/>
  <!-- Load cup tied to movable spool -->
  <line x1="230" y1="153" x2="230" y2="178" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M210 178 L205 220 Q205 228 218 228 L242 228 Q255 228 255 220 L250 178 Z" fill="white" stroke="#7c3aed" stroke-width="2.5"/>
  <rect x="208" y="174" width="44" height="8" rx="3" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Pennies in cup -->
  <circle cx="220" cy="205" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="234" cy="210" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="225" cy="218" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <!-- Pull test arrow -->
  <line x1="85" y1="195" x2="85" y2="230" stroke="#374151" stroke-width="3" stroke-linecap="round" marker-end="url(#pullarr)"/>
  <defs>
    <marker id="pullarr" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,0 L8,0 L4,8 Z" fill="#374151"/>
    </marker>
  </defs>
  <text x="58" y="248" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="10" fill="#374151">Pull!</text>
  <text x="200" y="258" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#7e22ce">Tie load cup to movable spool 🪣</text>
  <text x="200" y="276" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Pull effort string — does the cup rise? ↑</text>
</svg>
