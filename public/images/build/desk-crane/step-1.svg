<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- Cardboard base -->
  <rect x="60" y="200" width="220" height="20" rx="4" fill="#d97706" opacity="0.7"/>
  <rect x="60" y="195" width="220" height="10" rx="3" fill="#fbbf24" opacity="0.8"/>
  <!-- Cardboard tube mast -->
  <rect x="155" y="70" width="30" height="130" rx="6" fill="#d97706"/>
  <rect x="158" y="70" width="8" height="130" rx="3" fill="#fbbf24" opacity="0.5"/>
  <!-- Tape wraps at base -->
  <rect x="148" y="185" width="44" height="8" rx="2" fill="#9ca3af" opacity="0.85"/>
  <rect x="148" y="175" width="44" height="6" rx="2" fill="#9ca3af" opacity="0.7"/>
  <rect x="148" y="166" width="44" height="5" rx="2" fill="#9ca3af" opacity="0.55"/>
  <rect x="148" y="158" width="44" height="4" rx="2" fill="#9ca3af" opacity="0.4"/>
  <!-- Push test arrow -->
  <path d="M260 120 L210 130" stroke="#ef4444" stroke-width="3" stroke-linecap="round" marker-end="url(#redarr)"/>
  <text x="278" y="116" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#ef4444">Push test!</text>
  <defs>
    <marker id="redarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Must not wobble badge -->
  <rect x="270" y="150" width="110" height="38" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="325" y="165" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#15803d">Must NOT</text>
  <text x="325" y="180" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#15803d">wobble! ✓</text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#7e22ce">Tape mast upright — wrap 4+ times 🏗️</text>
  <text x="200" y="273" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Push the top sideways to test!</text>
</svg>
