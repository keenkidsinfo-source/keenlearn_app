<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fdf4ff" rx="20"/>
  <!-- Base -->
  <rect x="80" y="210" width="180" height="16" rx="4" fill="#fbbf24" opacity="0.7"/>
  <!-- Mast -->
  <rect x="158" y="80" width="28" height="135" rx="5" fill="#d97706"/>
  <!-- Boom arm -->
  <rect x="182" y="80" width="120" height="18" rx="5" fill="#92400e"/>
  <rect x="182" y="82" width="120" height="6" rx="3" fill="#b45309" opacity="0.5"/>
  <!-- Tape at boom-mast joint -->
  <rect x="178" y="76" width="20" height="26" rx="3" fill="#9ca3af" opacity="0.8"/>
  <!-- 15cm measurement arrow -->
  <line x1="182" y1="108" x2="302" y2="108" stroke="#7c3aed" stroke-width="2" marker-start="url(#startarr)" marker-end="url(#endarr)"/>
  <defs>
    <marker id="startarr" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="endarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="242" y="122" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="12" fill="#7c3aed">15 cm →</text>
  <!-- Horizontal label -->
  <line x1="182" y1="65" x2="182" y2="76" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="302" y1="65" x2="302" y2="78" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="200" y="258" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="14" fill="#7e22ce">Tape boom arm to top of mast ➡️</text>
  <text x="200" y="276" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial" font-size="11" fill="#9333ea">Sticks out 15cm — tape firmly!</text>
</svg>
